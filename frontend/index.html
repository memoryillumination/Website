<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Illumination</title>
    <script src="js/transitions.js" defer></script>
  </head>
  <body class="bg-[#f6f6f6] text-[#0f0f0f] font-[&quot;Nunito&quot;,Helvetica,Arial,sans-serif] antialiased">
    <!-- Fixed Header -->
    <header
      class="fixed top-0 left-0 right-0 z-[100] bg-white border-b border-[#e5e5e5] h-14 dark:bg-[#1a1a1a] dark:border-[#3a3a3a]"
    >
      <div class="max-w-[1100px] mx-auto px-6 h-full flex items-center justify-between">
        <a
          href="index.html"
          class="font-semibold text-[1.1em] text-[#0f0f0f] no-underline select-none dark:text-[#f6f6f6]"
          >Memory Illumination</a
        >
        <nav class="flex gap-3 items-center">
          <a
            href="about.html"
            class="text-[0.9em] font-medium text-[#0f0f0f] no-underline px-2 py-1 hover:text-[#007bff] dark:text-[#f6f6f6]"
            >About</a
          >
          <a
            href="faq.html"
            class="text-[0.9em] font-medium text-[#0f0f0f] no-underline px-2 py-1 hover:text-[#007bff] dark:text-[#f6f6f6]"
            >FAQ</a
          >
          <a
            href="login.html"
            class="inline-block px-[1.1em] py-[0.4em] text-[0.9em] font-medium rounded-lg border border-[#007bff] bg-transparent text-[#007bff] no-underline hover:bg-[#007bff] hover:text-white dark:border-[#5b9cf6] dark:text-[#5b9cf6] dark:hover:bg-[#5b9cf6] dark:hover:text-white"
            >Login</a
          >
          <a
            href="register.html"
            class="inline-block px-[1.1em] py-[0.4em] text-[0.9em] font-medium rounded-lg border border-[#007bff] bg-[#007bff] text-white no-underline hover:bg-[#0056b3] hover:border-[#0056b3]"
            >Register</a
          >
        </nav>
      </div>
    </header>

    <!-- Home / Landing Page -->
    <div id="home-page" class="flex flex-col items-center justify-center min-h-[calc(100vh-56px)] mt-14 text-center">
      <div class="flex flex-col items-center gap-5 max-w-[600px] px-8 py-8">
        <h1 class="text-[2.5em] font-bold m-0">Memory Illumination</h1>
        <p class="text-[1.1em] text-[#555] m-0 dark:text-[#aaa]">
          Transform your photos into sketches and coloring pages.
        </p>
        <a
          href="login.html"
          class="w-auto px-8 py-[0.7em] text-[1em] font-medium rounded-lg border border-[#007bff] bg-[#007bff] text-white no-underline hover:bg-[#0056b3] hover:border-[#0056b3] active:bg-[#004a99] active:border-[#004a99]"
          >Get Started</a
        >
      </div>
    </div>
  </body>
</html>
