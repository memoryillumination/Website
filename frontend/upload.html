<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload — Memory Illumination</title>
    <script src="js/transitions.js" defer></script>
    <script src="js/tour.js" defer></script>
    <script src="js/upload.js" defer></script>
  </head>
  <body class="bg-[#f6f6f6] text-[#0f0f0f] antialiased">
    <header class="fixed top-0 left-0 right-0 z-[100] bg-white border-b border-[#e5e5e5] h-14">
      <div class="max-w-[1100px] mx-auto px-6 h-full flex items-center justify-between">
        <a href="index.html" class="font-semibold text-[1.1em] text-[#0f0f0f] no-underline select-none"
          >Memory Illumination</a
        >
        <nav class="flex gap-3 items-center">
          <a
            href="about.html"
            class="text-[0.9em] font-medium text-[#0f0f0f] no-underline px-2 py-1 hover:text-[#007bff]"
            >About</a
          >
          <a href="faq.html" class="text-[0.9em] font-medium text-[#0f0f0f] no-underline px-2 py-1 hover:text-[#007bff]"
            >FAQ</a
          >
          <span id="nav-username" class="text-[0.9em] text-[#555]"></span>
          <button
            id="logout-btn"
            class="inline-block px-[1.1em] py-[0.4em] text-[0.9em] font-medium rounded-lg border border-[#6c757d] bg-transparent text-[#6c757d] cursor-pointer hover:bg-[#6c757d] hover:text-white"
          >
            Log out
          </button>
        </nav>
      </div>
    </header>

    <main class="mx-auto px-4 pt-14 pb-8 flex flex-col justify-center text-center max-w-[500px] min-h-screen">
      <form id="upload-form" class="flex flex-col gap-5 p-8 rounded-xl shadow-[0_4px_16px_rgba(0,0,0,0.07)] bg-white">
        <h3 class="text-lg font-semibold m-0">Upload Your File</h3>
        <div class="flex w-full text-center gap-2">
          <input
            type="file"
            id="file-input"
            accept="image/*"
            class="w-full rounded-lg border border-[#ccc] px-[1.2em] py-[0.6em] text-[1em] bg-white box-border"
          />
        </div>
        <div id="style-options" class="flex w-full text-center gap-2">
          <label class="inline-block w-1/2 box-border">
            <input type="checkbox" id="check-option-1" class="w-auto m-0" />
            <span> Sketch</span>
          </label>
          <label class="inline-block w-1/2 box-border">
            <input type="checkbox" id="check-option-2" class="w-auto m-0" />
            <span> Coloring Page</span>
          </label>
        </div>
        <button
          type="submit"
          class="w-full rounded-lg border border-[#007bff] px-[1.2em] py-[0.6em] text-[1em] font-medium bg-[#007bff] text-white cursor-pointer hover:bg-[#0056b3] hover:border-[#0056b3] active:bg-[#004a99] active:border-[#004a99] box-border"
        >
          Upload
        </button>
      </form>
      <p id="status-message" class="mt-4 font-bold min-h-6"></p>
    </main>
  </body>
</html>
