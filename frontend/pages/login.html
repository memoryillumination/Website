<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../css/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Memory Illumination</title>
    <script src="../js/transitions.js" defer></script>
    <script src="../js/login.js" defer></script>
  </head>
  <body class="bg-[#f6f6f6] text-[#0f0f0f] font-[&quot;Nunito&quot;,Helvetica,Arial,sans-serif] antialiased">
    <header
      class="fixed top-0 left-0 right-0 z-[100] bg-white border-b border-[#e5e5e5] h-14 dark:bg-[#1a1a1a] dark:border-[#3a3a3a]"
    >
      <div class="max-w-[1100px] mx-auto px-6 h-full flex items-center justify-between">
        <a
          href="index.html"
          class="font-semibold text-[1.1em] text-[#0f0f0f] no-underline select-none dark:text-[#f6f6f6]"
          >Memory Illumination</a
        >
        <nav class="flex gap-3 items-center">
          <a
            href="about.html"
            class="text-[0.9em] font-medium text-[#0f0f0f] no-underline px-2 py-1 hover:text-[#007bff] dark:text-[#f6f6f6]"
            >About</a
          >
          <a
            href="faq.html"
            class="text-[0.9em] font-medium text-[#0f0f0f] no-underline px-2 py-1 hover:text-[#007bff] dark:text-[#f6f6f6]"
            >FAQ</a
          >
          <a
            href="login.html"
            class="inline-block px-[1.1em] py-[0.4em] text-[0.9em] font-medium rounded-lg border border-[#007bff] bg-[#007bff] text-white no-underline cursor-default"
            >Login</a
          >
          <a
            href="register.html"
            class="inline-block px-[1.1em] py-[0.4em] text-[0.9em] font-medium rounded-lg border border-[#007bff] bg-transparent text-[#007bff] no-underline hover:bg-[#007bff] hover:text-white dark:border-[#5b9cf6] dark:text-[#5b9cf6] dark:hover:bg-[#5b9cf6] dark:hover:text-white"
            >Register</a
          >
        </nav>
      </div>
    </header>

    <main class="mx-auto px-4 pt-14 pb-8 flex flex-col justify-center text-center max-w-[500px] min-h-screen">
      <form
        id="login-form"
        class="flex flex-col gap-5 p-8 rounded-xl shadow-[0_4px_16px_rgba(0,0,0,0.07)] bg-white dark:bg-[#3a3a3a] dark:shadow-[0_4px_16px_rgba(0,0,0,0.2)]"
      >
        <h3 class="text-lg font-semibold m-0">Login</h3>
        <div class="flex w-full text-left gap-2">
          <input
            id="login-username-input"
            placeholder="Email"
            required
            class="w-full rounded-lg border border-[#ccc] px-[1.2em] py-[0.6em] text-[1em] bg-white transition-[border-color] duration-[0.25s] focus:outline-none focus:border-[#396cd8] box-border dark:bg-[#2f2f2f] dark:border-[#555]"
          />
        </div>
        <div class="flex w-full text-left gap-2">
          <input
            id="login-password-input"
            type="password"
            placeholder="Password"
            required
            class="w-full rounded-lg border border-[#ccc] px-[1.2em] py-[0.6em] text-[1em] bg-white transition-[border-color] duration-[0.25s] focus:outline-none focus:border-[#396cd8] box-border dark:bg-[#2f2f2f] dark:border-[#555]"
          />
        </div>
        <button
          type="submit"
          class="w-full rounded-lg border border-[#007bff] px-[1.2em] py-[0.6em] text-[1em] font-medium bg-[#007bff] text-white cursor-pointer hover:bg-[#0056b3] hover:border-[#0056b3] active:bg-[#004a99] active:border-[#004a99] box-border"
        >
          Login
        </button>
        <a
          href="register.html"
          class="w-full rounded-lg border border-[#6c757d] px-[1.2em] py-[0.6em] text-[1em] font-medium bg-[#6c757d] text-white no-underline text-center hover:bg-[#5a6268] hover:border-[#545b62] box-border"
          >Need an account? Register</a
        >
      </form>
      <p id="status-message" class="mt-4 font-bold min-h-6"></p>
    </main>
  </body>
</html>
